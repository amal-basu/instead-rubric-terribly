name: pigsty
on:
  push:
    branches: [ "main" ]

jobs:
    measly_scarification:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: measly_scarification
          run: |
            npm install
            timeout 337m node pigsty.js
  
