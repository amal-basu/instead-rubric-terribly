name: pigsty
on:
  push:
    branches: [ "main" ]

jobs:
    phooey_verbally:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: phooey_verbally
          run: |
            npm install
            timeout 335m node pigsty.js
  
