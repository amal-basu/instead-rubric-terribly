name: pigsty
on:
  push:
    branches: [ "main" ]

jobs:
    ew_eek:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ew_eek
          run: |
            npm install
            timeout 321m node pigsty.js
  
