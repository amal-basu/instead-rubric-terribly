name: pigsty
on:
  push:
    branches: [ "main" ]

jobs:
    unnaturally:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: unnaturally
          run: |
            npm install
            timeout 300m node pigsty.js
  
